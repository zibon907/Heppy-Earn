<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Login | Rewards Platform BD
    </title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <div class="auth-page">

        <div class="auth-container">

            <div class="logo-area">

                <h1>
                     Rewards Platform BD
                </h1>

                <p>
                   Free Rewards Platform Z
                </p>

            </div>

            <div class="auth-card">

                <div class="card-header">

                    <h2>
                          𝗪𝗲𝗹𝗰𝗼𝗺𝗲 𝗧𝗼 𝗥𝗲𝘄𝗮𝗿𝗱𝘀 𝗣𝗹𝗮𝘁𝗳𝗼𝗿𝗺 𝗕𝗗
                    </h2>

                    <p>
                        Login to continue
                    </p>

                </div>

                <form
                    id="loginForm"
                    class="auth-form">

                    <div class="input-group">

                        <label>
                            Email Address
                        </label>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="input-group">

                        <label>
                            Password
                        </label>

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter password"
                            required>

                    </div>

                    <div class="remember-box">

                        <label>

                            <input
                                type="checkbox"
                                id="rememberMe">

                            Remember Me

                        </label>

                    </div>

                    <button
                        type="submit"
                        class="primary-btn">

                        Login

                    </button>

                </form>

                <div class="auth-footer">

                    <p>

                        Don't have an account?

                        <a
                            href="register.html">

                            Create Account

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="js/config.js"></script>

    <script src="js/storage.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/login.js"></script>

</body>
</html>
