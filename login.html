<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Virtual Gaming Platform</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0f172a;
    font-family:Arial,sans-serif;
}

.login-card{
    width:100%;
    max-width:450px;
    background:#111827;
    color:white;
    padding:30px;
    border-radius:16px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1f2937;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.message{
    margin-top:15px;
    text-align:center;
}

a{
    color:#60a5fa;
}

</style>
</head>

<body>

<div class="login-card">

    <h1>Login</h1>

    <form id="loginForm">

        <div class="form-group">
            <label>Email</label>

            <input
                type="email"
                id="email"
                required
            >
        </div>

        <div class="form-group">
            <label>Password</label>

            <input
                type="password"
                id="password"
                required
            >
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div id="message" class="message"></div>

    <p class="message">
        No account?
        <a href="register.html">
            Register
        </a>
    </p>

</div>

<script>

class LoginPage {

    constructor() {

        this.form =
            document.getElementById(
                "loginForm"
            );

        this.message =
            document.getElementById(
                "message"
            );

        this.bindEvents();
    }

    bindEvents() {

        this.form.addEventListener(
            "submit",
            event => {

                event.preventDefault();

                this.login();
            }
        );
    }

    login() {

        const email =
            document.getElementById(
                "email"
            ).value.trim();

        const password =
            document.getElementById(
                "password"
            ).value;

        const user =
            JSON.parse(
                localStorage.getItem(
                    "vgp_user"
                )
            );

        if (!user) {

            this.showMessage(
                "Account not found",
                "red"
            );

            return;
        }

        if (
            user.email !== email ||
            user.password !== password
        ) {

            this.showMessage(
                "Invalid credentials",
                "red"
            );

            return;
        }

        sessionStorage.setItem(
            "authenticated",
            "true"
        );

        sessionStorage.setItem(
            "currentUser",
            JSON.stringify(user)
        );

        this.showMessage(
            "Login successful",
            "#22c55e"
        );

        setTimeout(() => {

            window.location.href =
                "dashboard.html";

        }, 1000);
    }

    showMessage(
        text,
        color
    ) {

        this.message.textContent =
            text;

        this.message.style.color =
            color;
    }
}

new LoginPage();

</script>

</body>
</html>
