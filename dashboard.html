<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard |Rewards Platform </title>

<link rel="stylesheet" href="css/profile.css">
</head>

<body>

<!-- ===================================== -->
<!-- APP LAYOUT -->
<!-- ===================================== -->

<div class="app-layout">

    <!-- ===================================== -->
    <!-- SIDEBAR -->
    <!-- ===================================== -->

    <aside class="sidebar">

        <div class="sidebar-header">
            <h2 class="brand-logo">Rewards Platform</h2>
        </div>

        <nav class="sidebar-nav">

            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="profile.html" class="nav-link">Profile</a>
            <a href="settings.html" class="nav-link">Settings</a>
            <a href="notifications.html" class="nav-link">Notifications</a>

        </nav>

    </aside>

    <!-- ===================================== -->
    <!-- MAIN CONTENT -->
    <!-- ===================================== -->

    <main class="main-content">

        <!-- ===================================== -->
        <!-- TOPBAR -->
        <!-- ===================================== -->

        <header class="topbar">

            <div class="topbar-left">
                <h1>Dashboard Overview</h1>
            </div>

            <div class="topbar-right">

                <button id="notificationBtn" class="icon-button">
                    Notifications
                </button>

                <button id="logoutBtn" class="logout-button">
                    Logout
                </button>

            </div>

        </header>

        <!-- ===================================== -->
        <!-- USER WELCOME CARD -->
        <!-- ===================================== -->

        <section class="card profile-hero">

            <div>
                <h2 id="userName">Loading...</h2>
                <p id="userEmail">email@example.com</p>
            </div>

        </section>

        <!-- ===================================== -->
        <!-- STATS GRID -->
        <!-- ===================================== -->

        <section class="stats-grid">

            <div class="stat-card">
                <h3>Wallet</h3>
                <div id="userPoints" class="stat-value">0</div>
            </div>

            <div class="stat-card">
                <h3>VIP Level</h3>
                <div id="userVip" class="stat-value">Bronze</div>
            </div>

            <div class="stat-card">
                <h3>Referrals</h3>
                <div id="referralCount" class="stat-value">0</div>
            </div>

            <div class="stat-card">
                <h3>Referral Code</h3>
                <div id="referralCode" class="stat-value">---</div>
            </div>
            <script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
