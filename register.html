<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Register | Virtual Rewards Platform
    </title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <div class="auth-page">

        <div class="auth-container">

            <div class="logo-area">

                <h1>
                    Virtual Rewards
                </h1>

                <p>
                    Create your account
                </p>

            </div>

            <div class="auth-card">

                <div class="card-header">

                    <h2>
                        Create Account
                    </h2>

                    <p>
                        Join the platform today
                    </p>

                </div>

                <form
                    id="registerForm"
                    class="auth-form">

                    <div class="input-group">

                        <label>
                            Username
                        </label>

                        <input
                            type="text"
                            id="username"
                            placeholder="Enter username"
                            minlength="3"
                            maxlength="20"
                            required>

                    </div>

                    <div class="input-group">

                        <label>
                            Full Name
                        </label>

                        <input
                            type="text"
                            id="fullName"
                            placeholder="Enter full name"
                            required>

                    </div>

                    <div class="input-group">

                        <label>
                            Email Address
                        </label>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter email"
                            required>

                    </div>

                    <div class="input-group">

                        <label>
                            Password
                        </label>

                        <input
                            type="password"
                            id="password"
                            placeholder="Create password"
                            minlength="6"
                            required>

                    </div>

                    <div class="input-group">

                        <label>
                            Confirm Password
                        </label>

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm password"
                            required>

                    </div>

                    <div class="input-group">

                        <label>
                            Referral Code (Optional)
                        </label>

                        <input
                            type="text"
                            id="referralCode"
                            placeholder="Enter referral code">

                    </div>

                    <button
                        type="submit"
                        class="primary-btn">

                        Create Account

                    </button>

                </form>

                <div class="auth-footer">

                    <p>

                        Already have an account?

                        <a href="index.html">

                            Login Here

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="js/config.js"></script>

    <script src="js/storage.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/register.js"></script>

</body>

</html>
