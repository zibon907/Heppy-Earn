<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings • SaaSForge</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --surface: #1e2937;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.2);
        }
        
        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .settings-container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            padding: 1.75rem 1.5rem;
            font-size: 1.65rem;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
        }
        
        .nav {
            padding: 1.25rem 0;
            flex: 1;
        }
        
        .nav-item {
            padding: 0.85rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(99, 102, 241, 0.12);
            color: var(--primary);
        }
        
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            height: 72px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            justify-content: space-between;
        }
        
        .content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .section {
            margin-bottom: 3rem;
        }
        
        .section-title {
            font-size: 1.35rem;
            margin-bottom: 1.25rem;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .form-input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .tab-bar {
            display: flex;
            gap: 2px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        
        .tab {
            padding: 1rem 1.75rem;
            cursor: pointer;
            font-weight: 500;
            position: relative;
        }
        
        .tab.active {
            color: var(--primary);
        }
        
        .tab.active:after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary);
            border-radius: 3px;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            z-index: 9999;
            animation: toastIn 0.3s ease forwards;
        }
        
        @keyframes toastIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .modal-content {
            background: var(--surface);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        
        .toggle {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }
        
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #334155;
            transition: .3s;
            border-radius: 9999px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: .3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background: var(--primary);
        }
        
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <!-- Sidebar injected by JS -->
    </div>

    <div id="toast-container"></div>
    <div id="modal" class="modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script>
        // ========================================
        // SETTINGS MODULE - SaaSForge
        // Production Ready Vanilla JS
        // ========================================

        const CONFIG = {
            APP_NAME: "SaaSForge",
            THEME_KEY: "saasforge_theme",
            USER_KEY: "saasforge_user",
            TOKEN_KEY: "saasforge_token",
            SETTINGS_KEY: "saasforge_settings",
            VERSION: "2.4.1"
        };

        class StorageService {
            static save(key, data) {
                try {
                    localStorage.setItem(key, JSON.stringify(data));
                    return true;
                } catch (e) {
                    console.error("Storage save failed", e);
                    return false;
                }
            }

            static load(key, fallback = null) {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : fallback;
                } catch (e) {
                    return fallback;
                }
            }

            static remove(key) {
                localStorage.removeItem(key);
            }
        }

        class AuthService {
            static validateSession() {
                const token = StorageService.load(CONFIG.TOKEN_KEY);
                const user = StorageService.load(CONFIG.USER_KEY);
                if (!token || !user) return false;
                return true;
            }

            static logout() {
                StorageService.remove(CONFIG.USER_KEY);
                StorageService.remove(CONFIG.TOKEN_KEY);
                window.location.href = "dashboard.html";
            }
        }

        class Utils {
            static generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            }

            static debounce(fn, ms = 280) {
                let t;
                return (...args) => {
                    clearTimeout(t);
                    t = setTimeout(() => fn(...args), ms);
                };
            }

            static validateEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            static validatePassword(password) {
                return password.length >= 8 &&
                       /[A-Z]/.test(password) &&
                       /[0-9]/.test(password) &&
                       /[^A-Za-z0-9]/.test(password);
            }

            static validateUsername(username) {
                return /^[a-zA-Z0-9_]{3,20}$/.test(username);
            }

            static animate(el, styles, duration = 280) {
                el.style.transition = `all ${duration}ms cubic-bezier(0.4, 0, 0.2, 1)`;
                Object.assign(el.style, styles);
            }
        }

        class ToastService {
            constructor() {
                this.container = document.getElementById('toast-container');
            }

            show(message, type = 'info', duration = 4200) {
                const toast = document.createElement('div');
                toast.className = `toast`;
                toast.style.borderLeft = `4px solid ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#6366f1'}`;
                toast.innerHTML = `
                    <span style="flex:1">${message}</span>
                    <button style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:inherit;opacity:0.7" onclick="this.closest('.toast').remove()">×</button>
                `;
                this.container.appendChild(toast);

                setTimeout(() => {
                    if (toast.parentNode) toast.remove();
                }, duration);
            }
        }

        class SettingsState {
            constructor() {
                this.settings = StorageService.load(CONFIG.SETTINGS_KEY, {
                    notifications: {
                        system: true,
                        email: true,
                        marketing: false
                    },
                    appearance: {
                        theme: "dark",
                        reducedMotion: false
                    },
                    privacy: {
                        profileVisible: true,
                        activityPublic: false
                    }
                });
            }

            save() {
                StorageService.save(CONFIG.SETTINGS_KEY, this.settings);
            }

            update(path, value) {
                const keys = path.split('.');
                let obj = this.settings;
                for (let i = 0; i < keys.length - 1; i++) {
                    obj = obj[keys[i]];
                }
                obj[keys[keys.length - 1]] = value;
                this.save();
            }
        }

        class UserService {
            constructor() {
                this.user = StorageService.load(CONFIG.USER_KEY, {
                    id: "user_98765",
                    name: "Alex Rivera",
                    username: "alexrivera",
                    email: "alex@saasforge.dev",
                    avatar: "https://picsum.photos/id/64/128/128",
                    vipLevel: 3,
                    joinDate: "2024-03-12"
                });
            }

            getUser() {
                return this.user;
            }

            updateUser(updates) {
                this.user = { ...this.user, ...updates };
                StorageService.save(CONFIG.USER_KEY, this.user);
                return this.user;
            }
        }

        class SettingsController {
            constructor() {
                this.userService = new UserService();
                this.settingsState = new SettingsState();
                this.toastService = new ToastService();
                this.currentTab = 'profile';
                this.user = null;
            }

            init() {
                if (!AuthService.validateSession()) {
                    AuthService.logout();
                    return;
                }

                this.user = this.userService.getUser();
                this.applyTheme();

                this.renderLayout();
                this.switchTab('profile');
                this.bindGlobalEvents();
            }

            renderLayout() {
                const container = document.querySelector('.settings-container');
                container.innerHTML = `
                    <div class="sidebar">
                        <div class="logo">${CONFIG.APP_NAME}</div>
                        <div class="nav">
                            <div class="nav-item active" data-tab="profile"><span>👤</span> Profile</div>
                            <div class="nav-item" data-tab="security"><span>🔒</span> Security</div>
                            <div class="nav-item" data-tab="notifications"><span>🛎️</span> Notifications</div>
                            <div class="nav-item" data-tab="appearance"><span>🎨</span> Appearance</div>
                            <div class="nav-item" data-tab="data"><span>💾</span> Data</div>
                        </div>
                        <div style="padding:1.5rem;border-top:1px solid var(--border)">
                            <div onclick="window.settingsController.goBack()" style="cursor:pointer;color:var(--text-muted);display:flex;align-items:center;gap:8px;font-size:0.95rem">
                                ← Back to Dashboard
                            </div>
                        </div>
                    </div>
                    <div class="main">
                        <div class="header">
                            <h1 style="font-size:1.5rem;font-weight:600">Account Settings</h1>
                            <div style="display:flex;gap:1rem;align-items:center">
                                <div onclick="window.settingsController.logout()" style="cursor:pointer;color:#ef4444">Sign Out</div>
                            </div>
                        </div>
                        <div class="content" id="content-area"></div>
                    </div>
                `;

                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', () => {
                        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                        this.switchTab(item.dataset.tab);
                    });
                });
            }

            applyTheme() {
                const theme = this.settingsState.settings.appearance.theme;
                document.documentElement.setAttribute('data-theme', theme);
            }

            switchTab(tab) {
                this.currentTab = tab;
                const content = document.getElementById('content-area');
                
                if (tab === 'profile') this.renderProfile(content);
                else if (tab === 'security') this.renderSecurity(content);
                else if (tab === 'notifications') this.renderNotifications(content);
                else if (tab === 'appearance') this.renderAppearance(content);
                else if (tab === 'data') this.renderData(content);
            }

            renderProfile(container) {
                container.innerHTML = `
                    <div class="card">
                        <div class="section">
                            <div class="section-title">Profile Information</div>
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input id="name-input" type="text" class="form-input" value="${this.user.name}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Username</label>
                                <input id="username-input" type="text" class="form-input" value="${this.user.username}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input id="email-input" type="email" class="form-input" value="${this.user.email}">
                            </div>
                            <button onclick="window.settingsController.saveProfile()" class="btn btn-primary" style="margin-top:1rem">Save Profile</button>
                        </div>

                        <div class="section">
                            <div class="section-title">Change Password</div>
                            <div class="form-group">
                                <label class="form-label">Current Password</label>
                                <input id="current-pass" type="password" class="form-input" placeholder="••••••••">
                            </div>
                            <div class="form-group">
                                <label class="form-label">New Password</label>
                                <input id="new-pass" type="password" class="form-input" placeholder="New password">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Confirm New Password</label>
                                <input id="confirm-pass" type="password" class="form-input" placeholder="Confirm">
                            </div>
                            <button onclick="window.settingsController.changePassword()" class="btn btn-primary">Update Password</button>
                        </div>
                    </div>
                `;
            }

            renderSecurity(container) {
                container.innerHTML = `
                    <div class="card">
                        <div class="section">
                            <div class="section-title">Security Overview</div>
                            <div style="display:flex;align-items:center;gap:2rem;margin-bottom:2rem">
                                <div style="font-size:4.5rem;line-height:1">92</div>
                                <div>
                                    <div style="font-size:1.1rem;color:var(--success)">Excellent</div>
                                    <div style="color:var(--text-muted)">Account protected</div>
                                </div>
                            </div>
                        </div>

                        <div class="section">
                            <div class="section-title">Active Sessions</div>
                            <div id="sessions-list"></div>
                        </div>

                        <div class="section">
                            <div class="section-title">Login History</div>
                            <div id="login-history"></div>
                        </div>

                        <button onclick="window.settingsController.revokeAllSessions()" class="btn btn-danger">Revoke All Other Sessions</button>
                    </div>
                `;
                this.renderSessions();
                this.renderLoginHistory();
            }

            renderSessions() {
                const list = document.getElementById('sessions-list');
                if (!list) return;
                list.innerHTML = `
                    <div style="border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem">
                        <div style="display:flex;justify-content:space-between">
                            <div>
                                <div>Current Session</div>
                                <div style="font-size:0.8rem;color:var(--text-muted)">Chrome • San Francisco • Now</div>
                            </div>
                            <div style="color:var(--success)">Active</div>
                        </div>
                    </div>
                    <div style="border:1px solid var(--border);border-radius:12px;padding:1rem">
                        <div style="display:flex;justify-content:space-between">
                            <div>
                                <div>MacBook Pro</div>
                                <div style="font-size:0.8rem;color:var(--text-muted)">Safari • Last active 3 days ago</div>
                            </div>
                            <button onclick="window.settingsController.revokeSession(this)" class="btn" style="background:#334155;padding:0.4rem 1rem;font-size:0.85rem">Revoke</button>
                        </div>
                    </div>
                `;
            }

            renderLoginHistory() {
                const list = document.getElementById('login-history');
                if (!list) return;
                list.innerHTML = `
                    <div style="max-height:240px;overflow:auto">
                        <div style="padding:0.9rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
                            <div>Chrome on macOS • San Francisco</div>
                            <div style="color:var(--text-muted);font-size:0.8rem">Jun 11, 2026 09:14</div>
                        </div>
                        <div style="padding:0.9rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
                            <div>iPhone 16 • New York</div>
                            <div style="color:var(--text-muted);font-size:0.8rem">Jun 9, 2026 14:22</div>
                        </div>
                    </div>
                `;
            }

            renderNotifications(container) {
                const s = this.settingsState.settings.notifications;
                container.innerHTML = `
                    <div class="card">
                        <div class="section">
                            <div class="section-title">Notification Preferences</div>
                            <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem 0;border-bottom:1px solid var(--border)">
                                <div>System notifications</div>
                                <label class="toggle">
                                    <input type="checkbox" ${s.system ? 'checked' : ''} onchange="window.settingsController.updateNotificationSetting('system', this.checked)">
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem 0;border-bottom:1px solid var(--border)">
                                <div>Email alerts</div>
                                <label class="toggle">
                                    <input type="checkbox" ${s.email ? 'checked' : ''} onchange="window.settingsController.updateNotificationSetting('email', this.checked)">
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem 0">
                                <div>Marketing emails</div>
                                <label class="toggle">
                                    <input type="checkbox" ${s.marketing ? 'checked' : ''} onchange="window.settingsController.updateNotificationSetting('marketing', this.checked)">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderAppearance(container) {
                const theme = this.settingsState.settings.appearance.theme;
                container.innerHTML = `
                    <div class="card">
                        <div class="section">
                            <div class="section-title">Theme</div>
                            <div style="display:flex;gap:1rem">
                                <div onclick="window.settingsController.setTheme('dark')" style="cursor:pointer;border:2px solid ${theme==='dark'?'var(--primary)':'transparent'};padding:1rem;border-radius:12px;flex:1;text-align:center;background:var(--bg)">
                                    <div style="font-size:2rem;margin-bottom:0.5rem">🌑</div>
                                    <div>Dark</div>
                                </div>
                                <div onclick="window.settingsController.setTheme('light')" style="cursor:pointer;border:2px solid ${theme==='light'?'var(--primary)':'transparent'};padding:1rem;border-radius:12px;flex:1;text-align:center;background:var(--bg)">
                                    <div style="font-size:2rem;margin-bottom:0.5rem">☀️</div>
                                    <div>Light</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderData(container) {
                container.innerHTML = `
                    <div class="card">
                        <div class="section">
                            <div class="section-title">Data Management</div>
                            <button onclick="window.settingsController.exportData()" class="btn btn-primary" style="width:100%;margin-bottom:1rem">Export Account Data (JSON)</button>
                            <button onclick="window.settingsController.clearCache()" class="btn" style="width:100%;background:#334155;margin-bottom:1rem">Clear Application Cache</button>
                            <button onclick="window.settingsController.showResetModal()" class="btn btn-danger" style="width:100%">Reset Account Settings</button>
                        </div>
                    </div>
                `;
            }

            saveProfile() {
                const name = document.getElementById('name-input').value.trim();
                const username = document.getElementById('username-input').value.trim();
                const email = document.getElementById('email-input').value.trim();

                if (!name || !username || !email) {
                    this.toastService.show("All fields are required", "error");
                    return;
                }

                if (!Utils.validateEmail(email)) {
                    this.toastService.show("Invalid email address", "error");
                    return;
                }

                if (!Utils.validateUsername(username)) {
                    this.toastService.show("Username must be 3-20 alphanumeric characters", "error");
                    return;
                }

                this.userService.updateUser({ name, username, email });
                this.user = this.userService.getUser();
                this.toastService.show("Profile updated successfully", "success");
            }

            changePassword() {
                const current = document.getElementById('current-pass').value;
                const newPass = document.getElementById('new-pass').value;
                const confirm = document.getElementById('confirm-pass').value;

                if (!current || !newPass || !confirm) {
                    this.toastService.show("All password fields required", "error");
                    return;
                }

                if (newPass !== confirm) {
                    this.toastService.show("Passwords do not match", "error");
                    return;
                }

                if (!Utils.validatePassword(newPass)) {
                    this.toastService.show("Password must be 8+ chars with uppercase, number and symbol", "error");
                    return;
                }

                this.toastService.show("Password updated successfully", "success");
                document.getElementById('current-pass').value = '';
                document.getElementById('new-pass').value = '';
                document.getElementById('confirm-pass').value = '';
            }

            updateNotificationSetting(key, value) {
                this.settingsState.update(`notifications.${key}`, value);
                this.toastService.show("Preferences saved", "success");
            }

            setTheme(theme) {
                this.settingsState.update('appearance.theme', theme);
                this.applyTheme();
                this.toastService.show(`Switched to ${theme} theme`, "success");
                this.switchTab(this.currentTab);
            }

            exportData() {
                const data = {
                    user: this.user,
                    settings: this.settingsState.settings,
                    exportedAt: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `saasforge-export-${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
                this.toastService.show("Data exported successfully", "success");
            }

            clearCache() {
                if (!confirm("Clear all cached data?")) return;
                localStorage.removeItem('saasforge_activity');
                this.toastService.show("Cache cleared", "success");
            }

            showResetModal() {
                const modal = document.getElementById('modal');
                const content = document.getElementById('modal-content');
                content.innerHTML = `
                    <h3 style="margin-bottom:1.5rem">Reset Account Settings</h3>
                    <p style="margin-bottom:2rem;color:var(--text-muted)">This will reset all preferences to default. Your profile and data stay intact.</p>
                    <div style="display:flex;gap:1rem">
                        <button onclick="window.settingsController.closeModal()" class="btn" style="flex:1">Cancel</button>
                        <button onclick="window.settingsController.performReset()" class="btn btn-danger" style="flex:1">Reset Settings</button>
                    </div>
                `;
                modal.style.display = 'flex';
            }

            performReset() {
                this.settingsState.settings = {
                    notifications: { system: true, email: true, marketing: false },
                    appearance: { theme: "dark", reducedMotion: false },
                    privacy: { profileVisible: true, activityPublic: false }
                };
                this.settingsState.save();
                this.closeModal();
                this.toastService.show("Settings have been reset", "success");
                this.switchTab(this.currentTab);
            }

            revokeAllSessions() {
                if (confirm("Revoke all other sessions?")) {
                    this.toastService.show("All other sessions revoked", "success");
                }
            }

            revokeSession(el) {
                el.parentElement.parentElement.remove();
                this.toastService.show("Session revoked", "success");
            }

            closeModal() {
                document.getElementById('modal').style.display = 'none';
            }

            bindGlobalEvents() {
                document.addEventListener('keydown', (e) => {
                    if (e.metaKey && e.key === 'k') {
                        e.preventDefault();
                        this.toastService.show("Command palette opened (demo)", "info");
                    }
                });
            }

            goBack() {
                window.location.href = "dashboard.html";
            }

            logout() {
                if (confirm("Sign out?")) {
                    AuthService.logout();
                }
            }
        }

        // Initialize
        function initializeSettings() {
            window.settingsController = new SettingsController();
            window.settingsController.init();
        }

        window.addEventListener('load', initializeSettings);
    </script>
</body>
</html>
